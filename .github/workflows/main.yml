name: Main

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-workflows:
    name: Check workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download actionlint
        id: download-actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/7fdc9630cc360ea1a469eed64ac6d78caeda1234/scripts/download-actionlint.bash) 1.6.25
        shell: bash
      - name: Check workflow files
        run: ${{ steps.download-actionlint.outputs.executable }} -color
        shell: bash

  analyse-code:
    name: Code scanner
    needs: check-workflows
    uses: ./.github/workflows/security-code-scanner.yml
    permissions:
      actions: read
      contents: read
      security-events: write
    secrets:
      SECURITY_SCAN_METRICS_TOKEN: ${{ secrets.SECURITY_SCAN_METRICS_TOKEN }}
      APPSEC_BOT_SLACK_WEBHOOK: ${{ secrets.APPSEC_BOT_SLACK_WEBHOOK }}

  lint-build-test:
    name: Lint, build, and test
    needs: check-workflows
    uses: ./.github/workflows/lint-build-test.yml

  test-storybook:
    name: Test Storybook
    needs: check-workflows
    uses: ./.github/workflows/test-storybook.yml

  chromatic:
    name: Chromatic
    needs: check-workflows
    uses: ./.github/workflows/chromatic.yml
    secrets:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  detect-figma-code-connect-changes:
    name: Detect Figma Code Connect changes
    needs: check-workflows
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Code Connect file changes
        id: detect
        shell: bash
        run: |
          PATTERN='^packages/design-system-react(-native)?/(.*/)?[^/]+\.figma\.tsx$|^packages/design-system-react(-native)?/figma\.config\.json$'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}"
            CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            if [[ -z "${{ github.event.before }}" || "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            CHANGED_FILES="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          if echo "$CHANGED_FILES" | grep -qE "$PATTERN"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  figma-code-connect:
    name: Figma Code Connect
    needs:
      - check-workflows
      - detect-figma-code-connect-changes
    if: needs.detect-figma-code-connect-changes.outputs.changed == 'true'
    uses: ./.github/workflows/figma-code-connect.yml
    with:
      publish: ${{ github.event_name == 'push' }}
    secrets:
      FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}

  is-release:
    name: Determine whether this is a release merge commit
    needs: lint-build-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      IS_RELEASE: ${{ steps.is-release.outputs.IS_RELEASE }}
    steps:
      - id: is-release
        uses: MetaMask/action-is-release@dc4672b05e3b1d464cdaf783579b04a4e43f8b02
        with:
          commit-starts-with: 'Release [version],Release v[version],Release/[version],Release/v[version],Release `[version]`'

  publish-release:
    name: Publish release
    needs: is-release
    if: needs.is-release.outputs.IS_RELEASE == 'true'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/publish-release.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  all-jobs-complete:
    name: All jobs complete
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - analyse-code
      - lint-build-test
      - test-storybook
      - chromatic
      - figma-code-connect
    outputs:
      passed: ${{ steps.set-output.outputs.passed }}
    steps:
      - name: Check that all jobs have passed
        id: set-output
        shell: bash
        run: |
          REQUIRED=(
            "analyse-code:${{ needs.analyse-code.result }}"
            "lint-build-test:${{ needs.lint-build-test.result }}"
            "test-storybook:${{ needs.test-storybook.result }}"
            "chromatic:${{ needs.chromatic.result }}"
          )

          for entry in "${REQUIRED[@]}"; do
            name="${entry%%:*}"
            result="${entry#*:}"
            if [[ "$result" != "success" ]]; then
              echo "$name finished with $result"
              exit 1
            fi
          done

          FIGMA_RESULT="${{ needs.figma-code-connect.result }}"
          if [[ "$FIGMA_RESULT" != "success" && "$FIGMA_RESULT" != "skipped" ]]; then
            echo "figma-code-connect finished with $FIGMA_RESULT"
            exit 1
          fi

          echo "passed=true" >> "$GITHUB_OUTPUT"

  all-jobs-pass:
    name: All jobs pass
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: all-jobs-complete
    steps:
      - name: Check that all jobs have passed
        run: |
          passed="${{ needs.all-jobs-complete.outputs.passed }}"
          if [[ $passed != "true" ]]; then
            exit 1
          fi
